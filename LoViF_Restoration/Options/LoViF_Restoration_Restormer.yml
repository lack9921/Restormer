# general settings
name: LoViF_AllTracks_Restormer
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 42

# dataset and data loader settings
datasets:
  train:
    name: LoViF_AllTracks
    type: ConcatLoViFDataset
    tracks:
      Blur:    {gt: /datasets_host/dataset/LoViF 2026/Blur/GT, lq: /datasets_host/dataset/LoViF 2026/Blur/LQ}
      Haze:    {gt: /datasets_host/dataset/LoViF 2026/Haze/GT, lq: /datasets_host/dataset/LoViF 2026/Haze/LQ}
      Lowlight: {gt: /datasets_host/dataset/LoViF 2026/Lowlight/GT, lq: /datasets_host/dataset/LoViF 2026/Lowlight/LQ}
      Rain:    {gt: /datasets_host/dataset/LoViF 2026/Rain/GT, lq: /datasets_host/dataset/LoViF 2026/Rain/LQ}
      Snow:    {gt: /datasets_host/dataset/LoViF 2026/Snow/GT, lq: /datasets_host/dataset/LoViF 2026/Snow/LQ}
    geometric_augs: true

    filename_tmpl: '{}'
    io_backend:
      type: disk

    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 1

    ### -------------Progressive training--------------------------
    mini_batch_sizes: [1,1,1,1,1,1]
    iters: [92000,64000,48000,36000,36000,24000]
    gt_size: 384
    gt_sizes: [128,160,192,256,320,384]
    ### ------------------------------------------------------------

    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_blur:
    name: LoViF_Val_Blur
    type: Dataset_PairedImage
    dataroot_gt: /datasets_host/dataset/LoViF_val/Blur/GT
    dataroot_lq: /datasets_host/dataset/LoViF_val/Blur/LQ
    io_backend:
      type: disk
  val_haze:
    name: LoViF_Val_Haze
    type: Dataset_PairedImage
    dataroot_gt: /datasets_host/dataset/LoViF_val/Haze/GT
    dataroot_lq: /datasets_host/dataset/LoViF_val/Haze/LQ
    io_backend:
      type: disk
  val_lowlight:
    name: LoViF_Val_Lowlight
    type: Dataset_PairedImage
    dataroot_gt: /datasets_host/dataset/LoViF_val/Lowlight/GT
    dataroot_lq: /datasets_host/dataset/LoViF_val/Lowlight/LQ
    io_backend:
      type: disk
  val_rain:
    name: LoViF_Val_Rain
    type: Dataset_PairedImage
    dataroot_gt: /datasets_host/dataset/LoViF_val/Rain/GT
    dataroot_lq: /datasets_host/dataset/LoViF_val/Rain/LQ
    io_backend:
      type: disk
  val_snow:
    name: LoViF_Val_Snow
    type: Dataset_PairedImage
    dataroot_gt: /datasets_host/dataset/LoViF_val/Snow/GT
    dataroot_lq: /datasets_host/dataset/LoViF_val/Snow/LQ
    io_backend:
      type: disk

# network structures
network_g:
  type: Restormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4,6,6,8]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: WithBias
  dual_pixel_task: False

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  total_iter: 300000
  warmup_iter: 500
  gradient_accumulation_steps: 8
  use_grad_clip: true

  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [92000, 208000]
    restart_weights: [1,1]
    eta_mins: [0.0003,0.000001]

  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true

  optim_g:
    type: AdamW
    lr: !!float 3e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  window_size: 8
  val_freq: !!float 4e3
  save_img: false
  rgb2bgr: true
  use_image: true
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
    lpips:
      type: calculate_lpips
      better: lower

# logging settings
logger:
  print_freq: 1000
  save_checkpoint_freq: !!float 4e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~
